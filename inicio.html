<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oiii</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="logo.png">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="inicio.html"><img id="logo" src="logo.png" alt="logo"></a></div>
        <div class="header-center">
            <!--MENU SUPERIOR-->
            <div class="top-menu">
                <nav><a class="menu-nav home-page" href="inicio.html">Início</a></nav>
                <nav><a class="menu-nav following-page" href="seguindo.html">Seguindo</a></nav>
                <nav><a class="menu-nav explore-page" href="explorar.html">Explorar</a></nav>
            </div>
            <!--BARRA DE PESQUISA-->
            <div class="bottom-menu">
                <div class="search-bar">
                    <div class="search-icon">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </div>
                    <input type="text" id="search" placeholder="Pesquise aqui">
                </div>
            </div>
        </div>

        <div class="menu-modals">
            <!--MODAL DO LOGIN-->
            <button class="open-modal" data-modal="modal-1">Entrar</button>

            <dialog id="modal-1">
                    <div id="wrap">
                        <!--botão para alternar entre cadastro e login-->
                        <div class="change-button">
                            <div class="change-button1">
                                <button class="close-modal login-close-button" data-modal="modal-1">X</button>
                                <h6><span>Cadastrar</span><span>Entrar</span></h6>
                                <input type="checkbox" class="checkbox" id="checkbox">
                                <label for="checkbox"></label>
                            </div>
                            <div class="change-button2">
                                <button class="close-modal login-close-button" data-modal="modal-1">X</button>
                                <h6><span>Cadastrar</span><span>Entrar</span></h6>
                                <input type="checkbox" class="checkbox" id="checkbox">
                                <label for="checkbox"></label>
                            </div>
                        </div>

                        <div id="wrapper">
                            <div id="login">   
                                <div class="center-wrap">
                                    <form action="#" method="post" class="login">
                                        <h2>Entrar</h2>
                                        <div class="caixa-input">
                                            <input type="text" id="user_email" name="user_email" required>
                                            <label for="user_email">Nome de Usuário ou Email</label>
                                        </div>
                                        <div class="caixa-input">
                                            <input type="password" id="senha-login" name="senha" required>
                                            <label for="senha">Senha</label>
                                        </div>
                                        <button type="submit">Entrar</button>
                                    </form>
                                </div>
                            </div>

                            <div id="cadastro">
                                <div class="center-wrap">
                                    <form action="#" method="post" class="sign">
                                        <h2>Cadastre-se</h2>
                                        <div class="caixa-input">
                                            <input type="text" id="user-cadastro" name="user" required>
                                            <label for="user">Usuário</label>
                                        </div>
                                        <div class="caixa-input">
                                            <input type="email" id="email-cadastro" name="email" required>
                                            <label for="email">Email</label>
                                        </div>
                                        <div class="caixa-input">
                                            <input type="text" id="data-nascimento" name="data_nascimento" pattern="\d{2}\/\d{2}\/\d{4}" required>
                                            <label for="data_nascimento">Data de Nascimento</label>
                                        </div>
                                        <div class="caixa-input">
                                            <input type="password" id="senha-cadastro" name="senha" required>
                                            <label for="senha">Senha</label>
                                        </div>
                                        <button type="submit">Cadastrar</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                
            </dialog>

            <!--MODAL DO MENU HAMBÚRGUER-->
            <button class="open-modal" data-modal="modal-2">Menu</button>
            <dialog id="modal-2">
                <h1>teste 2</h1>
                <button class="close-modal" data-modal="modal-2">X</button>
            </dialog>
        </div>
    </header>

</body>
</html>
